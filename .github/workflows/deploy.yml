name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build frontend
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo -e "Host server\n  HostName ${{ secrets.SSH_HOST }}\n  Port ${{ secrets.SSH_PORT || '22' }}\n  User ${{ secrets.SSH_USERNAME }}\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no" > ~/.ssh/config

      - name: Rsync to server
        run: |
          rsync -avzr --delete \
            --exclude=.env \
            --exclude=storage \
            --exclude=.git \
            --exclude=node_modules \
            ./ server:${{ secrets.DEPLOY_PATH }}

      - name: Post-deploy commands
        run: |
          ssh server << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link --force
            php artisan optimize
            sudo systemctl reload nginx
          EOF
