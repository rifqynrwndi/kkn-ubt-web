name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build frontend
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << SSHCONFIG
          Host server
            HostName ${{ secrets.SSH_HOST }}
            Port ${{ secrets.SSH_PORT || '22' }}
            User ${{ secrets.SSH_USERNAME }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          SSHCONFIG
          chmod 600 ~/.ssh/config
          ssh server "echo 'SSH connection OK'"

      - name: Rsync to server
        run: |
          ssh server "mkdir -p ${{ secrets.DEPLOY_PATH }}"
          rsync -avzr --delete \
            --exclude=.env \
            --exclude=storage \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.github \
            ./ server:${{ secrets.DEPLOY_PATH }}

      - name: Post-deploy commands
        run: |
          ssh -T server bash << 'REMOTE'
          set -e
          cd ${{ secrets.DEPLOY_PATH }}
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan storage:link --force 2>/dev/null || true
          php artisan optimize
          sudo systemctl reload nginx 2>/dev/null || true
          echo "Deploy completed successfully"
          REMOTE
